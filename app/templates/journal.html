{% extends "base.html" %}

{% block content %}
<div class="journal-container">
    
    <!-- Header Section -->
    <div class="journal-header">
        <h1><span class="calendar-icon">🗓️</span> Health Journal</h1>
        <p>Track your daily symptoms and supplement effects</p>
    </div>

    <!-- Main Calendar Card -->
    <div class="calendar-card">
        
        <!-- Month Navigation -->
        <div class="calendar-navigation">
            <button id="prev-month-btn" class="nav-arrow">‹</button>
            <h2 id="current-month-year"></h2>
            <button id="next-month-btn" class="nav-arrow">›</button>
        </div>

        <!-- Day Names -->
        <div class="day-names">
            <span>Sun</span>
            <span>Mon</span>
            <span>Tue</span>
            <span>Wed</span>
            <span>Thu</span>
            <span>Fri</span>
            <span>Sat</span>
        </div>

        <!-- Calendar Grid -->
        <div class="calendar-grid" id="calendar-grid">
            <!-- JavaScript will populate this grid -->
        </div>
    </div>
</div>
{% endblock %}
